<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year Four Vocabulary Station</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --danger: #dc2626; --bg: #f1f5f9; --card-bg: #ffffff; --text: #0f172a; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .main-wrapper { width: 100%; max-width: 850px; margin: 15px auto; display: block; }
        
        .student-card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); padding: 30px; text-align: center; box-sizing: border-box; display: block; position: relative; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; width: 100%; margin-top: 15px; clear: both; }
        
        .menu-btn { background-color: #f8fafc; color: var(--text); border: 2px solid #e2e8f0; padding: 16px; font-size: 1.02rem; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: left; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; width: 100%; position: relative; z-index: 10; transition: all 0.2s; }
        .menu-btn:hover { background-color: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }
        
        .top-navigation-bar { display: block; width: 100%; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 20px; text-align: left; box-sizing: border-box; }
        .nav-inner-layout { display: flex; justify-content: space-between; align-items: center; }
        
        .back-nav-btn { background: #e2e8f0; color: #475569; border: none; padding: 8px 14px; font-size: 0.9rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .back-nav-btn:hover { background: #cbd5e1; color: var(--text); }
        
        .target-word { font-size: 4.2rem; font-weight: 800; letter-spacing: 1px; margin: 15px 0; transition: opacity 0.5s ease; color: var(--text); }
        .hidden-word { opacity: 0 !important; }
        
        .rule-box { background: #f8fafc; border-left: 5px solid var(--primary); padding: 20px; border-radius: 0 8px 8px 0; font-size: 1.15rem; margin: 20px 0; width: 100%; box-sizing: border-box; text-align: left; line-height: 1.6; }
        .rule-box strong { color: var(--primary); }
        .rule-box ul { margin: 8px 0; padding-left: 20px; }
        
        .lock-container { background: #fef2f2; border: 2px dashed var(--danger); border-radius: 8px; padding: 15px; margin: 0 auto; width: 100%; max-width: 400px; box-sizing: border-box; }
        
        .student-input { font-size: 1.5rem; padding: 12px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; width: 80%; max-width: 350px; display: inline-block; box-sizing: border-box; }
        .teacher-password-input { font-size: 1.3rem; padding: 8px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; width: 220px; display: inline-block; box-sizing: border-box; }
        
        button.action-btn { background-color: var(--primary); color: white; border: none; padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; display: inline-block; }
        button.action-btn:hover { background-color: #1d4ed8; }
        
        .sentence-prompt { font-size: 1.6rem; margin-bottom: 25px; line-height: 1.6; text-align: center; }
        .feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="student-card" id="gameCard"></div>
</div>

<script>
    const MASTER_SPELLING_RULES = {
        "ea_three_sounds": "🏫 <strong>Three Sounds of 'ea' Lesson (List 34a):</strong><br>The spelling <strong>'ea'</strong> can make three completely different vowel sounds. It can sound like long /e/ (<em>eat</em>), short /e/ (<em>bread</em>), or long /a/ (<em>steak</em>).<br><ul><li>Examples: meat, sneak, dead, sweat, breath, spread, steak, great, break.</li></ul>",
        "ey_vowel_team": "🏫 <strong>Vowel Team 'ey' Lesson (List 34b):</strong><br>The team <strong>'ey'</strong> usually represents the long /e/ sound at the end of a word, but can occasionally say long /a/ (as in <em>they</em>).<br><ul><li>Examples: key, money, hockey, donkey, monkey, turkey, valley, they, grey, obey.</li></ul>",
        "ie_long_i": "🏫 <strong>Vowel Team 'ie' Long /i/ Lesson (List 34c):</strong><br>The vowel team <strong>'ie'</strong> represents the long /i/ sound inside or at the end of these one or two-syllable words.<br><ul><li>Examples: pie, tie, lie, fried, tried, die, died, magpie, spied.</li></ul>",
        "oe_ew_vowels": "🏫 <strong>Vowel Teams 'oe' and 'ew' Lesson (List 34d & 34e):</strong><br>The team <strong>'oe'</strong> says long /o/ (<em>toe</em>), while <strong>'ew'</strong> can represent the long /u/ sound (<em>few</em>).<br><ul><li>Examples: toe, foe, goes, potatoes, tomatoes, few, new, knew, stew, nephew.</li></ul>",
        "homophones_match": "🏫 <strong>Homophones Lesson (List 35):</strong><br>Homophones are words that sound exactly the same out loud but have <strong>different spellings</strong> and <strong>different meanings</strong>.<br><ul><li>Examples: red/read, pear/pair, right/write, ate/eight, here/hear, son/sun, week/weak, meet/meat.</li></ul>",
        "aw_au_sounds": "🏫 <strong>Vowel Teams 'aw' and 'au' Lesson (List 36):</strong><br>Both vowel teams represent the <strong>/or/ sound</strong>. We usually use 'aw' at the end of words or before an 'n' or 'l', and 'au' at the start or middle.<br><ul><li>Examples: saw, jaw, straw, crawl, awful, Paul, haul, sauce, August, autumn, author.</li></ul>",
        "trigraph_dge": "🏫 <strong>Trigraph 'dge' Lesson (List 37):</strong><br>The letter 'j' is never used at the very end of an English word! We use the long spelling marker <strong>'dge'</strong> right after a short vowel sound.<br><ul><li>Examples: fudge, nudge, judge, edge, hedge, wedge, bridge, ridge, fridge, badge.</li></ul>",
        "ew_ue_food_sound": "🏫 <strong>'ew' and 'ue' as /oo/ Lesson (List 38):</strong><br>These vowel teams represent the /oo/ sound as heard in the word <em>food</em>.<br><ul><li>Examples: crew, chew, flew, grew, threw, clue, blue, glue, true, tissue.</li></ul>",
        "tiger_rule_division": "🏫 <strong>Syllable Division - Tiger Rule V.CV (List 39):</strong><br>When one consonant falls between two vowels, divide <strong>after the first vowel</strong>. This creates an open syllable with a long vowel sound.<br><ul><li>Examples: pu-pil, ro-bot, ho-tel, mo-tel, to-tal, ba-sin, fro-zen.</li></ul>",
        "cvc_doubling_rule": "🏫 <strong>CVC Doubling Rule Lesson (List 40):</strong><br>In a one-syllable word ending in a <strong>Consonant-Vowel-Consonant (CVC)</strong> layout, you must double the final consonant before adding a vowel suffix (-er, -ing, -ed).<br><ul><li>Examples: hot ➔ hotter, hug ➔ hugged, rot ➔ rotten, stop ➔ stopped.</li></ul>",
        "prefixes_un_re_dis": "🏫 <strong>Prefixes un-, re-, dis- Lesson (List 41):</strong><br>A prefix is placed before a base word to alter its meaning. <strong>re-</strong> means 'do again' and <strong>dis-</strong> means 'the opposite of'.<br><ul><li>Examples: redo, reload, replay, repeat, rethink, disagree, disable, disappeared, dishonest, discover.</li></ul>",
        "camel_rule_division": "🏫 <strong>Syllable Division - Camel Rule VC.V (List 42):</strong><br>When one consonant falls between two vowels, divide <strong>before the second vowel</strong> if the first vowel makes its short sound.<br><ul><li>Examples: cam-el, den-im, cab-in, plan-et, pun-ish, sev-en, pan-ic, com-ic, sol-id.</li></ul>",
        "suffixes_ful_less": "🏫 <strong>Suffixes '-ful' and '-less' Lesson (List 43):</strong><br>A suffix goes at the end of a word. <strong>-ful</strong> means 'full of' (spelled with only one 'l'), and <strong>-less</strong> means 'without'.<br><ul><li>Examples: helpful, playful, thankful, wonderful, careless, hopeless, useless, spotless.</li></ul>",
        "silent_e_suffix_rule": "🏫 <strong>Silent e Suffix Rule Lesson (List 44):</strong><br>When adding a <strong>vowel suffix</strong> to a silent e word, <strong>DROP the e</strong>. When adding a <strong>consonant suffix</strong>, <strong>KEEP the e</strong>.<br><ul><li>Examples (+vowel): icing, hoping, tamed, saved, broken.</li><li>Examples (+consonant): hopeful, likely, lonely, hopeless, useless.</li></ul>",
        "consonant_le_syllable": "🏫 <strong>Consonant-le Syllable Lesson (List 45):</strong><br>A final syllable layout containing a consonant, an 'l', and an 'e' (-ble, -dle, -tle). Double the middle consonant if the starting vowel sound is short!<br><ul><li>Examples: table, bible, cradle, wiggle, little, muddle, puddle, settle, humble, temple.</li></ul>"
    };

    const DATA_LISTS = [
        {

            words: [

                { word: "crawl", rule: "aw_au_sounds", sentence: "We watched the tiny green caterpillar slowly __ up the plant stem." },
                { word: "awful", rule: "aw_au_sounds", sentence: "The sour milk had an absolutely __ taste when I took a sip." },

                { word: "rethink", rule: "prefixes_un_re_dis", sentence: "If this plan fails, we will have to carefully __ our strategy." },
                { word: "disagree", rule: "prefixes_un_re_dis", sentence: "It is perfectly okay to safely __ with your friends' opinions sometimes." },

                { word: "hoping", rule: "silent_e_suffix_rule", sentence: "I am really __ that the weather stays sunny for our picnic trip tomorrow." },

        {

            words: [
                { word: "table", rule: "consonant_le_syllable", sentence: "Please set the plates and forks down on the dining room __." },
                { word: "cradle", rule: "consonant_le_syllable", sentence: "The mother gently rocked the sleeping infant inside her wooden __." },

    const formViewURL = "https://docs.google.com/forms/d/e/1FAIpQLSddB0NQFaIBv9x-feJucH_YGDwHb8suDI9h1ShPOv1yGzCCXQ/viewform";
    const nameKey = "entry.421008981"; const wordsKey = "entry.1429911539"; const incorrectKey = "entry.407995943"; const scoreKey = "entry.211442136";
    
    let activeLessonWords = []; let currentWordIndex = 0; let currentStep = 0; 
    let activeLessonLabel = ""; let studentName = "";
    let correctWordsList = []; let incorrectWordsList = []; let correctCount = 0;

    function resetToListMenu() {
        currentStep = 0.5;
        renderStep();
    }

    function renderStep() {
        const card = document.getElementById('gameCard');
        
        if (currentStep === 0) {
            card.innerHTML = `<h2>Year Four Vocabulary Station</h2><p style="font-size: 1.2rem;">Enter your name to begin:</p><input type="text" id="nameInput" class="student-input" placeholder="Your Name..."><br><button class="action-btn" onclick="submitName()">Enter Station</button>`;
            document.getElementById('nameInput').focus();
        } else if (currentStep === 0.5) {
            let buttons = "";
            DATA_LISTS.forEach((listObj, index) => {
                buttons += `<button class="menu-btn" onclick="launchRuleByIndex(${index})"><span style="display:block; margin-bottom: 8px;">${listObj.title}</span><span style="font-size:0.85rem; font-weight:normal; color:#64748b;">(${listObj.words.length} words)</span></button>`;
            });
            card.innerHTML = `<h2>Welcome, ${studentName}!</h2><p style="font-size: 1.2rem; margin-bottom:10px;">Select your spelling list:</p><div class="menu-grid">${buttons}</div>`;
        } else {
            const currentData = activeLessonWords[currentWordIndex];
            
            let progressHTML = `
                <div class="top-navigation-bar">
                    <div class="nav-inner-layout">
                        <span style="font-weight:bold; color:var(--primary); font-size:1.1rem;">${activeLessonLabel} &bull; Word ${currentWordIndex + 1} of ${activeLessonWords.length}</span>
                        <button class="back-nav-btn" onclick="resetToListMenu()">⬅ Go Back to Lists</button>
                    </div>
                </div>`;
                
            let ruleExplanation = MASTER_SPELLING_RULES[currentData.rule] || `💡 <strong>Pattern Rule:</strong> Focus on spelling your target words carefully!`;

            if (currentStep === 1) {
                card.innerHTML = `${progressHTML}<div class="target-word">${currentData.word}</div><div class="rule-box">${ruleExplanation}</div><button class="action-btn" onclick="nextStep()">I Studied It</button>`;
            } else if (currentStep === 2) {
                let hint = currentWordIndex === 0 ? "The starting password is: <strong>tiger</strong>" : "Type the previous word you just spelled to unlock your notebook work!";
                let correctPasswordValue = currentWordIndex === 0 ? "tiger" : activeLessonWords[currentWordIndex - 1].word;
                
                card.innerHTML = `${progressHTML}<div style="font-size: 1.4rem; font-weight: bold; color: var(--danger);">Notebook Practice</div><ol style="text-align: left; margin: 20px auto; max-width: 85%; font-size: 1.2rem; line-height: 1.6;"><li>Look closely at the word: <strong>${currentData.word}</strong></li><li>Write it down on paper 5 times.</li></ol><div class="lock-container"><label style="font-weight: bold; display:block; margin-bottom:5px;">Password Lock</label><span style="font-size:0.9rem; color:#64748b; display:block; margin-bottom:10px;">${hint}</span><input type="text" id="passInput" class="teacher-password-input" placeholder="Password..." autocomplete="off"><br><button id="lockBtn" style="margin-top:10px; padding: 8px 20px; background-color: var(--danger); border:none; color:white; font-weight:bold; border-radius:6px; cursor:pointer;">Unlock</button><div id="lockFeedback" class="feedback"></div></div>`;
                
                document.getElementById('passInput').focus();
                document.getElementById('lockBtn').onclick = function() {
                    let enteredPass = document.getElementById('passInput').value.trim().toLowerCase().replace(/[^a-zA-Z0-9]/g, "");
                    if(enteredPass === correctPasswordValue.toLowerCase().replace(/[^a-zA-Z0-9]/g, "")) { nextStep(); }
                    else { const fb = document.getElementById('lockFeedback'); fb.className = "feedback error"; fb.innerHTML = "Incorrect password lock."; }
                };
            } else if (currentStep === 3) {
                card.innerHTML = `${progressHTML}<p style="font-size:1.3rem;">Study before it disappears...</p><div class="target-word" id="fadingWord">${currentData.word}</div>`;
                setTimeout(() => { document.getElementById('fadingWord')?.classList.add('hidden-word'); setTimeout(() => { nextStep(); }, 800); }, 1800);
            } else if (currentStep === 4) {
                card.innerHTML = `${progressHTML}<div class="sentence-prompt">${currentData.sentence}</div><input type="text" id="testInput" class="student-input" placeholder="Spell here" autocomplete="off"><br><button class="action-btn" onclick="checkTestAnswer()">Verify Spelling</button><div id="testFeedback" class="feedback"></div>`;
                document.getElementById('testInput').focus();
            }
        }

    function submitName() { const val = document.getElementById('nameInput').value.trim(); if(val) { studentName = val; currentStep = 0.5; renderStep(); } }
    
    function launchRuleByIndex(index) { 
        const selectedList = DATA_LISTS[index];
        activeLessonWords = selectedList.words; 
        activeLessonLabel = selectedList.title; 
        currentWordIndex = 0; 
        correctWordsList = []; 
        incorrectWordsList = []; 
        correctCount = 0; 
        currentStep = 1; 
        renderStep(); 
    }
    
    function nextStep() { currentStep++; renderStep(); }
    
    function checkTestAnswer() {
        const originalEntered = document.getElementById('testInput').value.trim();
        const enteredEvaluated = originalEntered.toLowerCase().replace(/[^a-zA-Z-]/g, "");
        const correctEvaluated = activeLessonWords[currentWordIndex].word.toLowerCase().replace(/[^a-zA-Z-]/g, "");
        
        if(enteredEvaluated === correctEvaluated) { 
            correctCount++; 
            correctWordsList.push(activeLessonWords[currentWordIndex].word); 
        } else { 
            incorrectWordsList.push(`${originalEntered || '[Blank]'} (${activeLessonWords[currentWordIndex].word})`); 
        }
        
        const fb = document.getElementById('testFeedback');
        fb.className = enteredEvaluated === correctEvaluated ? "feedback success" : "feedback error";
        fb.innerHTML = enteredEvaluated === correctEvaluated ? "Correct!" : `Incorrect. Spelling is "${activeLessonWords[currentWordIndex].word}".`;
        
        setTimeout(() => { if (currentWordIndex < activeLessonWords.length - 1) { currentWordIndex++; currentStep = 1; renderStep(); } else { showEndScreen(); } }, 2200);
    }

    function showEndScreen() {
        document.getElementById('gameCard').innerHTML = `
            <div class="top-navigation-bar">
                <div class="nav-inner-layout" style="justify-content: flex-end;">
                    <button class="back-nav-btn" onclick="resetToListMenu()">🏠 Home Menu</button>
                </div>
            </div>
            <h1 style="color: var(--success);">Practice Complete</h1>
            <p>Great job, ${studentName}!</p>
            <p>Score: <strong>${correctCount} out of ${activeLessonWords.length}</strong></p>
            <div id="submissionZone"><button class="action-btn" onclick="openGoogleFormLink()">Send Progress Form</button></div>`;
    }

    function openGoogleFormLink() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctWordsList.join(', ') || "None")}&${incorrectKey}=${encodeURIComponent(incorrectWordsList.join(', ') || "None")}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        window.open(filledURL, '_blank');
        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold;">Form opened! Click submit on that page to finish.</p>`;
    }

    renderStep();
</script>
</body>
</html>
