<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code 4 Vocabulary Station (Year Five/Six)</title>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card-bg: #ffffff; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .teacher-panel { background: #f1f5f9; border: 2px dashed #94a3b8; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .teacher-panel h2 { margin-top: 0; color: #334155; }
        .bulk-textarea { width: 100%; height: 180px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: monospace; font-size: 13px; box-sizing: border-box; margin-bottom: 15px; resize: vertical; }
        .student-card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); padding: 40px; text-align: center; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; width: 100%; max-width: 650px; margin-top: 20px; }
        .menu-btn { background-color: #f8fafc; color: var(--text); border: 2px solid #e2e8f0; padding: 18px; font-size: 1.05rem; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: left; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-btn:hover { background-color: var(--primary); color: white; border-color: var(--primary); }
        .progress-bar { font-weight: bold; color: var(--primary); margin-bottom: 20px; font-size: 1.1rem; }
        .target-word { font-size: 4.5rem; font-weight: 800; letter-spacing: 1px; margin: 10px 0; transition: opacity 0.5s ease; }
        .hidden-word { opacity: 0 !important; }
        .rule-box { background: #f8fafc; border-left: 5px solid var(--primary); padding: 20px; border-radius: 0 8px 8px 0; font-size: 1.15rem; margin: 20px 0; max-width: 90%; text-align: left; line-height: 1.6; }
        .rule-box strong { color: var(--primary); }
        .rule-box ul { margin: 8px 0; padding-left: 20px; }
        .lock-container { background: #fef2f2; border: 2px dashed var(--danger); border-radius: 8px; padding: 15px; margin: 0 auto; width: 90%; max-width: 400px; }
        .teacher-password-input, .student-input { font-size: 1.5rem; padding: 12px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; }
        .teacher-password-input { width: 240px; font-size: 1.2rem; padding: 8px; text-transform: lowercase;}
        .student-input { width: 80%; max-width: 350px; text-transform: lowercase; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #2563eb; }
        .sentence-prompt { font-size: 1.6rem; margin-bottom: 25px; line-height: 1.6; }
        .sentence-prompt em { color: var(--primary); font-weight: bold; font-style: normal; text-decoration: underline; }
        .feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }
        .toggle-panel-btn { background: #64748b; margin-bottom: 10px; padding: 8px 16px; font-size: 0.9rem; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <button class="toggle-panel-btn" onclick="secureTogglePanel()">Open Control Panel</button>
    <div class="teacher-panel" id="teacherPanel">
        <h2>Code 4 Setup Panel (Year 5/6)</h2>
        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold;">First Word Unlock Passcode: </label>
            <input type="text" id="teacherCodeSetting" value="tiger" style="padding:5px; font-size:1rem; width:120px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold; display:block; margin-bottom:5px;">Paste Code 4 Word List Below:</label>
            <div style="font-size:0.85rem; color:#64748b; margin-bottom:5px;">Format: Word, Rule_Key, Sentence with __ blank</div>
            <textarea id="bulkPasteInput" class="bulk-textarea" placeholder="weigh, eigh_long_a, Use the kitchen scales to __ out the sugar."></textarea>
            <button onclick="processBulkPaste()" style="margin-top:0; padding:10px 20px; font-size:1rem; background-color:var(--success); width:100%;">Apply List to Code 4</button>
        </div>
    </div>
    <div class="student-card" id="gameCard"></div>
</div>

<script>
    // Embedded Code 4 (Year 5/6) Diagnostic Spelling Rules
    const MASTER_SPELLING_RULES = {
        "eigh_long_a": "🏫 <strong>Vowel Team 'eigh' represents long /a/ Lesson:</strong><br>The vowel team <strong>'eigh'</strong> is an alternative spelling configuration to represent the long /a/ sound.<br><ul><li>Examples: <em>eight</em>, <em>weight</em>, <em>neighbour</em>, <em>sleigh</em>, <em>neigh</em>, <em>freight</em>, <em>weigh</em>, and <em>heavyweight</em>.</li></ul>",
        
        "ie_long_e": "🏫 <strong>Vowel Team 'ie' represents long /e/ Lesson:</strong><br>The vowel team <strong>'ie'</strong> often operates to make a long /e/ sound within base word syllables.<br><ul><li>Examples: <em>chief</em>, <em>thief</em>, <em>field</em>, <em>piece</em>, <em>movie</em>, <em>brief</em>, <em>grief</em>, <em>belief</em>, <em>believe</em>, <em>shriek</em>, and <em>shield</em>.</li></ul>",
        
        "ough_long_o_or_ou": "🏫 <strong>Vowel Team 'ough' variations Lesson:</strong><br>The complex vowel team <strong>'ough'</strong> can represent multi-structural variants like long /o/, as /or/, and as /ou/.<br><ul><li>Long /o/: <em>though</em>, <em>although</em>, <em>dough</em>, <em>doughnut</em>.</li><li>As /or/: <em>bought</em>, <em>fought</em>, <em>thought</em>, <em>brought</em>, <em>nought</em>.</li><li>As /ou/: <em>plough</em>, <em>bough</em>, <em>drought</em>.</li></ul>",
        
        "ue_long_u": "🏫 <strong>Vowel Team 'ue' represents long /u/ Lesson:</strong><br>The structural spelling team <strong>'ue'</strong> creates a clear long /u/ sound.<br><ul><li>Examples: <em>cue</em>, <em>due</em>, <em>avenue</em>, <em>continue</em>, <em>fuel</em>, <em>argue</em>, <em>value</em>, <em>rescue</em>, and <em>statue</em>.</li></ul>",
        
        "soft_c_g": "🏫 <strong>Soft C and Soft G Structural Rules Lesson:</strong><br>When followed by letters <strong>'e', 'i', or 'y'</strong>, the consonants modify their hard sounds into soft variants:<br><ul><li><strong>Soft C</strong> sounds like /s/ (e.g., <em>cent</em>, <em>city</em>, <em>circle</em>, <em>fence</em>, <em>groceries</em>, <em>decided</em>, <em>cycle</em>).</li><li><strong>Soft G</strong> sounds like /j/ (e.g., <em>gem</em>, <em>giant</em>, <em>gym</em>, <em>magic</em>, <em>cage</em>, <em>huge</em>, <em>vegetable</em>, <em>danger</em>).</li></ul>",
        
        "homophones_3": "🏫 <strong>Homophones Mastery Lesson:</strong><br>Homophones are structurally distinct words that sound completely identical but retain completely different spellings and semantic meanings.<br><ul><li>Examples: <em>flour/flower</em>, <em>plain/plane</em>, <em>our/hour</em>, <em>aloud/allowed</em>, <em>cent/scent/sent</em>, <em>break/brake</em>, <em>flu/flew</em>.</li></ul>",
        
        "more_suffixes": "🏫 <strong>Morphology - Advanced Suffix Architectural Groups Lesson:</strong><br>Suffix meanings provide clues to understand the base layout of structural words:<br><ul><li><strong>-tion</strong> and <strong>-sion</strong> mean 'in the act or state of' (e.g., <em>celebration</em>, <em>pollution</em>, <em>division</em>, <em>confusion</em>, <em>explosion</em>).</li><li><strong>-cian</strong> denotes a technical skill or artistic profession (e.g., <em>musician</em>, <em>politician</em>, <em>magician</em>, <em>electrician</em>, <em>technician</em>).</li></ul>",
        
        "unusual_spellings": "🏫 <strong>Unusual Structural Spellings (Silent Consonants) Lesson:</strong><br>Certain legacy words contain distinct double letter patterns where one remains completely silent:<br><ul><li><strong>wr</strong> sounds like /r/ (e.g., <em>wrong</em>, <em>write</em>, <em>wreck</em>, <em>wrap</em>, <em>wrinkle</em>).</li><li><strong>kn</strong> sounds like /n/ (e.g., <em>knit</em>, <em>knot</em>, <em>know</em>, <em>knee</em>, <em>knob</em>).</li></ul>",
        
        "schwa_vowel": "🏫 <strong>The Unstressed Schwa Vowel Lesson:</strong><br>Words with multiple syllables have strong (stressed) and weak (unstressed) parts. The unstressed parts lose vowel purity and morph into a short 'uh' schwa sound, though it can be spelled with any vowel.<br><ul><li>Examples: <em>survive</em>, <em>winter</em>, <em>summer</em>, <em>never</em>, <em>dinner</em>, <em>rocket</em>, <em>quiet</em>, <em>magnet</em>, <em>silent</em>, <em>reason</em>, <em>lemon</em>, and <em>problem</em>.</li></ul>",
        
        "plural_f_fe": "🏫 <strong>Plural Transitions Ending in 'f' or 'fe' Lesson:</strong><br>Generally, when a base layout ends with an 'f' or 'fe' configuration, change the <strong>'f' to a 'v' and add 's' or 'es'</strong> to secure plural alignment.<br><ul><li>Examples: <em>calf / calves</em>, <em>loaf / loaves</em>, <em>half / halves</em>, <em>shelf / shelves</em>, <em>leaf / leaves</em>, <em>scarf / scarves</em>, <em>knife / knives</em>, and <em>thief / thieves</em>.</li></ul>"
    };

    // Google Form connection fields matches entry rules
    const formViewURL = "https://docs.google.com/forms/d/e/1FAIpQLSddB0NQFaIBv9x-feJucH_YGDwHb8suDI9h1ShPOv1yGzCCXQ/viewform";
    const nameKey = "entry.421008981"; const wordsKey = "entry.1429911539"; const incorrectKey = "entry.407995943"; const scoreKey = "entry.211442136";
    
    const storageKeyCurriculum = 'genericSavedCurriculum_Code4_Y56';
    const storageKeyCode = 'genericSavedCode_Code4_Y56';
    const MASTER_PANEL_PASSWORD = "admin"; 

    let masterRulesMap = {}; let activeLessonWords = []; let currentWordIndex = 0; let currentStep = 0; 
    let masterTeacherCode = "tiger"; let activeLessonLabel = ""; let studentName = "";
    let correctWordsList = []; let incorrectWordsList = []; let correctCount = 0;

    // Default Fallback Lists derived directly from Liz Kane Year 5/6 Scans
    const DEFAULT_CODE4_DATA = {
        "List 46a: Vowel Team eigh": [
            { word: "weigh", rule: "eigh_long_a", sentence: "Can you please __ the luggage before we go?" },
            { word: "eight", rule: "eigh_long_a", sentence: "The little puppy is now __ weeks old." },
            { word: "neighbour", rule: "eigh_long_a", sentence: "Our friendly __ lent us their gardening tools." },
            { word: "weight", rule: "eigh_long_a", sentence: "He lifted the heavy __ with both hands." }
        ],
        "List 46b: Vowel Team ie (/e/)": [
            { word: "chief", rule: "ie_long_e", sentence: "The fire __ directed the crew safely." },
            { word: "thief", rule: "ie_long_e", sentence: "The sneaky __ escaped with the gold medal." },
            { word: "field", rule: "ie_long_e", sentence: "We ran across the wide open grass __." },
            { word: "piece", rule: "ie_long_e", sentence: "May I please have a small __ of cake?" }
        ],
        "List 46c: Vowel Team ough": [
            { word: "though", rule: "ough_long_o_or_ou", sentence: "Even __ it rained, we still went for our walk." },
            { word: "bought", rule: "ough_long_o_or_ou", sentence: "She __ a brand new book yesterday." },
            { word: "thought", rule: "ough_long_o_or_ou", sentence: "I lost my train of __ when the bell rang." },
            { word: "drought", rule: "ough_long_o_or_ou", sentence: "The long __ left the farm soil dry." }
        ],
        "List 47: Soft C and Soft G": [
            { word: "circle", rule: "soft_c_g", sentence: "Draw a perfect __ on your whiteboard." },
            { word: "giant", rule: "soft_c_g", sentence: "The old story tells of a friendly beanstalk __." },
            { word: "magic", rule: "soft_c_g", sentence: "The entertainer performed an amazing __ trick." },
            { word: "decided", rule: "soft_c_g", sentence: "We finally __ to play inside today." }
        ],
        "List 53: Suffixes tion, sion, cian": [
            { word: "pollution", rule: "more_suffixes", sentence: "Picking up litter helps reduce environmental __." },
            { word: "explosion", rule: "more_suffixes", sentence: "We heard a loud __ from the construction site." },
            { word: "musician", rule: "more_suffixes", sentence: "The talented __ played the grand piano beautifully." }
        ],
        "List 55: Unstressed Schwa Vowel": [
            { word: "silent", rule: "schwa_vowel", sentence: "The whole library went completely __." },
            { word: "problem", rule: "schwa_vowel", sentence: "Can you solve this tricky math __?" },
            { word: "lemon", rule: "schwa_vowel", sentence: "The sour yellow __ squeezed into our drinks." }
        ],
        "List 56: Plurals with f or fe": [
            { word: "calves", rule: "plural_f_fe", sentence: "Two young __ were drinking milk from the cow." },
            { word: "loaves", rule: "plural_f_fe", sentence: "The baker made fresh __ of wholemeal bread." },
            { word: "knives", rule: "plural_f_fe", sentence: "Be extra careful when washing sharp kitchen __." },
            { word: "thieves", rule: "plural_f_fe", sentence: "The security cameras caught the __ on tape." }
        ]
    };

    function secureTogglePanel() {
        const p = document.getElementById('teacherPanel');
        if (p.style.display === 'none' || p.style.display === '') {
            const check = prompt("Enter Master Teacher Password to unlock configuration:");
            if (check === MASTER_PANEL_PASSWORD) { p.style.display = 'block'; }
            else if (check !== null) { alert("Incorrect teacher security credentials."); }
        } else { p.style.display = 'none'; }
    }

    function processBulkPaste() {
        const rawText = document.getElementById('bulkPasteInput').value.trim();
        if(!rawText) return alert("Box is empty!");
        const lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        let tempMap = {};
        lines.forEach(line => {
            const parts = line.split(',');
            const word = parts[0] ? parts[0].trim().toLowerCase() : "";
            const ruleName = parts[1] ? parts[1].trim() : "General List";
            const sentence = parts.slice(2).join(',') ? parts.slice(2).join(',').trim() : "Fill in the blank: ___";
            if (word) { if (!tempMap[ruleName]) tempMap[ruleName] = []; tempMap[ruleName].push({ word, rule: ruleName, sentence }); }
        });
        if (Object.keys(tempMap).length === 0) return alert("Invalid format layout lines.");
        masterRulesMap = tempMap;
        masterTeacherCode = document.getElementById('teacherCodeSetting').value.trim().toLowerCase();
        localStorage.setItem(storageKeyCurriculum, JSON.stringify(masterRulesMap));
        localStorage.setItem(storageKeyCode, masterTeacherCode);
        document.getElementById('bulkPasteInput').value = "";
        document.getElementById('teacherPanel').style.display = 'none';
        studentName = ""; currentStep = 0; renderStep();
        alert(`Code 4 Master Database Updated!`);
    }
    
    function getRequiredPassword() { 
        return currentWordIndex === 0 ? masterTeacherCode : activeLessonWords[currentWordIndex - 1].word; 
    }

    function findRuleExplanation(rawRuleName) {
        let cleaned = rawRuleName.toLowerCase().trim();
        for (let key in MASTER_SPELLING_RULES) {
            if (cleaned.startsWith(key)) { return MASTER_SPELLING_RULES[key]; }
        }
        return null;
    }

    function renderStep() {
        const card = document.getElementById('gameCard');
        if (Object.keys(masterRulesMap).length === 0) {
            card.innerHTML = `<h2>Code 4 Station</h2><p>Click <strong>Open Control Panel</strong> to paste custom data or refresh.</p>`;
            return;
        }
        if (currentStep === 0) {
            card.innerHTML = `<h2>Code 4 Vocabulary Station</h2><p style="font-size: 1.2rem;">Enter your name:</p><input type="text" id="nameInput" class="student-input" placeholder="Your Name..."><br><button onclick="submitName()">Enter Station</button>`;
            document.getElementById('nameInput').focus();
        } else if (currentStep === 0.5) {
            let buttons = "";
            Object.keys(masterRulesMap).forEach((ruleName) => {
                buttons += `<button class="menu-btn" onclick="launchRule('${encodeURIComponent(ruleName)}')"><span style="display:block; margin-bottom: 8px;">${ruleName}</span><span style="font-size:0.85rem; font-weight:normal; color:#64748b;">(${masterRulesMap[ruleName].length} words)</span></button>`;
            });
            card.innerHTML = `<h2>Welcome, ${studentName}!</h2><p style="font-size: 1.2rem; margin-bottom:10px;">Select your sub-list objective:</p><div class="menu-grid">${buttons}</div>`;
        } else {
            const currentData = activeLessonWords[currentWordIndex];
            let progressHTML = `<div class="progress-bar">${activeLessonLabel} &bull; Word ${currentWordIndex + 1} of ${activeLessonWords.length}</div>`;
            let ruleExplanation = findRuleExplanation(currentData.rule) || `💡 <strong>Pattern Rule:</strong> Structural focus on target phoneme group <em>${currentData.rule}</em>!`;

            if (currentStep === 1) {
                card.innerHTML = `${progressHTML}<div class="target-word">${currentData.word}</div><div class="rule-box">${ruleExplanation}</div><button onclick="nextStep()">I Studied It</button>`;
            } else if (currentStep === 2) {
                let hint = currentWordIndex === 0 ? `The starting lock word is: <strong>${masterTeacherCode}</strong>` : "Type the previous word you just spelled correctly to unlock your notebook checkpoint!";
                card.innerHTML = `${progressHTML}<div style="font-size: 1.4rem; font-weight: bold; color: var(--danger);">Notebook Practice Checkpoint</div><ol style="text-align: left; margin: 20px auto; max-width: 85%; font-size: 1.2rem; line-height: 1.6;"><li>Study target word structure: <strong>${currentData.word}</strong></li><li>Write it physically onto your paper workbook 5 times.</li></ol><div class="lock-container"><label style="font-weight: bold; display:block; margin-bottom:5px;">Password Lock</label><span style="font-size:0.9rem; color:#64748b; display:block; margin-bottom:10px;">${hint}</span><input type="text" id="passInput" class="teacher-password-input" placeholder="Password..." autocomplete="off"><br><button onclick="verifyTeacherCode()" style="margin-top:10px; padding: 8px 20px; background-color: var(--danger);">Verify Unlock</button><div id="lockFeedback" class="feedback"></div></div>`;
                document.getElementById('passInput').focus();
            } else if (currentStep === 3) {
                card.innerHTML = `${progressHTML}<p style="font-size:1.3rem;">Observe spelling pattern layout closely...</p><div class="target-word" id="fadingWord">${currentData.word}</div>`;
                setTimeout(() => { document.getElementById('fadingWord')?.classList.add('hidden-word'); setTimeout(() => { nextStep(); }, 800); }, 1800);
            } else if (currentStep === 4) {
                card.innerHTML = `${progressHTML}<div class="sentence-prompt">${currentData.sentence.replace('__', '<em>__</em>')}</div><input type="text" id="testInput" class="student-input" placeholder="Spell target word here..." autocomplete="off"><br><button onclick="checkTestAnswer()">Verify Spelling</button><div id="testFeedback" class="feedback"></div>`;
                document.getElementById('testInput').focus();
            }
        }
    }

    function submitName() { const val = document.getElementById('nameInput').value.trim(); if(val) { studentName = val; currentStep = 0.5; renderStep(); } }
    function launchRule(encoded) { activeLessonWords = masterRulesMap[decodeURIComponent(encoded)]; activeLessonLabel = decodeURIComponent(encoded); currentWordIndex = 0; correctWordsList = []; incorrectWordsList = []; correctCount = 0; currentStep = 1; renderStep(); }
    function nextStep() { currentStep++; renderStep(); }
    
    function verifyTeacherCode() { 
        if(document.getElementById('passInput').value.trim().toLowerCase() === getRequiredPassword()) { nextStep(); } 
        else { const fb = document.getElementById('lockFeedback'); fb.className = "feedback error"; fb.innerHTML = "Incorrect entry lock key."; } 
    }
    
    function checkTestAnswer() {
        const entered = document.getElementById('testInput').value.trim().toLowerCase();
        const correct = activeLessonWords[currentWordIndex].word;
        if(entered === correct) { correctCount++; correctWordsList.push(correct); } else { incorrectWordsList.push(`${entered || '[Blank]'} (${correct})`); }
        const fb = document.getElementById('testFeedback');
        fb.className = entered === correct ? "feedback success" : "feedback error";
        fb.innerHTML = entered === correct ? "Correct!" : `Incorrect. Spelling structure is "${correct}".`;
        setTimeout(() => { if (currentWordIndex < activeLessonWords.length - 1) { currentWordIndex++; currentStep = 1; renderStep(); } else { showEndScreen(); } }, 2200);
    }

    function showEndScreen() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        document.getElementById('gameCard').innerHTML = `<h1 style="color: var(--success);">Objective Complete</h1><p>Splendid tracking work, ${studentName}!</p><p>Score Result: <strong>${finalScore}</strong></p><div id="submissionZone" style="margin-top:25px;"><button onclick="openGoogleFormLink()" style="background-color: var(--success); font-size:1.3rem; padding:15px 35px;">Send Progress Form</button></div><button onclick="resetToMenu()" style="background-color: #64748b; margin-top:20px; font-size:0.95rem; padding:8px 16px;">Choose Another List</button>`;
    }

    function openGoogleFormLink() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctWordsList.join(', ') || "None")}&${incorrectKey}=${encodeURIComponent(incorrectWordsList.join(', ') || "None")}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        window.open(filledURL, '_blank');
        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold; font-size:1.1rem;">Form Link Dispatched! Ensure you click the blue 'Submit' button on that page to save results.</p>`;
    }

    function resetToMenu() {
        currentStep = 0.5;
        renderStep();
    }

    function init() {
        const savedCurriculum = localStorage.getItem(storageKeyCurriculum);
        const savedCode = localStorage.getItem(storageKeyCode);
        if (savedCurriculum) {
            masterRulesMap = JSON.parse(savedCurriculum);
        } else {
            masterRulesMap = DEFAULT_CODE4_DATA;
        }
        if (savedCode) masterTeacherCode = savedCode;
    }
    document.getElementById('teacherPanel').style.display = 'none';
    init(); renderStep();
</script>
</body>
</html>
